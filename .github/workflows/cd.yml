name: CD

on:
  push:
    tags:
      - "v*"      # v1.0.0 → production
      - "v*-rc*"  # v1.0.0-rc1 → staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  determine-environment:
  # ─────────────────────────────────────────────────────────────────────────────
    name: Determine Target Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      image_tag: ${{ steps.env.outputs.image_tag }}

    steps:
      - name: Parse tag
        id: env
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *"-rc"* ]]; then
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          else
            echo "environment=production" >> "$GITHUB_OUTPUT"
          fi
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────────────────
  publish-images:
  # ─────────────────────────────────────────────────────────────────────────────
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: determine-environment
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [api, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}:${{ needs.determine-environment.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=/api
            VITE_USE_MOCK=false

  # ─────────────────────────────────────────────────────────────────────────────
  deploy-staging:
  # ─────────────────────────────────────────────────────────────────────────────
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [determine-environment, publish-images]
    environment:
      name: staging
      url: https://staging.careiq.io

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/careiq

            # Pull latest images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull api frontend nginx

            # Rolling restart (zero-downtime)
            docker compose up -d --no-deps --scale api=2 api
            sleep 15  # wait for new containers to become healthy
            docker compose up -d --no-deps api frontend nginx

            # Verify health
            curl --retry 10 --retry-delay 5 --fail https://staging.careiq.io/health
            echo "Staging deployment complete: ${{ needs.determine-environment.outputs.image_tag }}"

      - name: Run staging smoke tests
        run: |
          API=https://staging.careiq.io
          # Quick health + login smoke test
          curl -sf $API/health | grep '"status"'
          TOKEN=$(curl -sf -X POST $API/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"analyst@careiq.io","password":"${{ secrets.DEMO_PASSWORD }}"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          curl -sf -H "Authorization: Bearer $TOKEN" $API/api/v1/analytics/dashboard | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'total_admissions_30d' in d"
          echo "Staging smoke tests passed ✅"

  # ─────────────────────────────────────────────────────────────────────────────
  deploy-production:
  # ─────────────────────────────────────────────────────────────────────────────
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [determine-environment, deploy-staging]
    if: needs.determine-environment.outputs.environment == 'production'
    environment:
      name: production
      url: https://careiq.io

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/careiq

            # Pull images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull api frontend nginx

            # Blue-green: bring up new containers before stopping old
            docker compose up -d --no-deps --scale api=2 api
            sleep 20
            docker compose up -d --no-deps api frontend nginx

            # Final health check
            curl --retry 15 --retry-delay 5 --fail https://careiq.io/health
            docker system prune -f --volumes=false
            echo "Production deployment complete: ${{ needs.determine-environment.outputs.image_tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CareIQ ${{ github.ref_name }}
          generate_release_notes: true
          draft: false

      - name: Notify Slack — production deployed
        if: always()
        run: |
          STATUS="${{ job.status }}"
          EMOJI=$([ "$STATUS" = "success" ] && echo "🚀" || echo "❌")
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"$EMOJI CareIQ *${{ github.ref_name }}* deployed to Production — $STATUS\"}"
