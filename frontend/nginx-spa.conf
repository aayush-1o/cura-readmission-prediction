# nginx SPA config — serves React Router app from /dist
# All unknown paths → index.html (client-side routing handles it)

server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Cache static assets aggressively (Vite content-hashes filenames)
    location ~* \.(js|css|woff2?|ttf|svg|png|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health check endpoint
    location = /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
