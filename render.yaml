## render.yaml — CareIQ Render.com Blueprint
## Deploy: connect repo on render.com → New → Blueprint → apply this file
## PostgreSQL is hosted on Supabase (paste DATABASE_URL manually in dashboard)
## ─────────────────────────────────────────────────────────────────────────────

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  - type: web
    name: careiq-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: .            # root context so `warehouse/` package is available
    dockerCommand: "uvicorn api.main:app --host 0.0.0.0 --port $PORT --workers 1 --log-level info"
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false             # paste your Supabase postgresql://... URL in dashboard
      - key: REDIS_URL
        sync: false             # paste your Upstash rediss://... URL in dashboard
      - key: SECRET_KEY
        generateValue: true     # Render auto-generates a secure random string
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info
      - key: FRONTEND_ORIGIN
        value: https://careiq-flax.vercel.app
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "60"
      - key: WORKERS
        value: "1"
      - key: DB_POOL_SIZE
        value: "3"
      - key: DB_POOL_MAX_OVERFLOW
        value: "5"
