# ─── CareIQ HTTP routing config ───────────────────────────────────────────────
# Included into nginx.conf for both HTTP and HTTPS servers.
# ─────────────────────────────────────────────────────────────────────────────

# ─── Security headers (applied to all responses) ──────────────────────────────
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Content-Security-Policy $csp_header always;
# HSTS — uncomment in production with real TLS
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# ─── FastAPI (REST + WebSocket) ──────────────────────────────────────────────
location /api/ {
    limit_req zone=api burst=20 nodelay;
    limit_conn perip 50;

    proxy_pass http://careiq_api/;
    proxy_http_version 1.1;
    proxy_set_header Connection "";    # enable keepalive to upstream
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;

    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;

    # Buffer to reduce TTFB on large JSON responses
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;
}

# ─── Auth endpoints (extra rate limiting) ────────────────────────────────────
location /api/auth/ {
    limit_req zone=auth burst=5 nodelay;

    proxy_pass http://careiq_api/auth/;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ─── Health check (no rate limit) ────────────────────────────────────────────
location = /health {
    proxy_pass http://careiq_api/health;
    proxy_set_header Host $host;
    access_log off;
}

# ─── Prometheus metrics (restrict to internal only in prod) ──────────────────
location = /metrics {
    # allow 10.0.0.0/8;    # internal network only — uncomment in production
    # deny all;
    proxy_pass http://careiq_api/metrics;
    proxy_set_header Host $host;
    access_log off;
}

# ─── MLflow Tracking UI ──────────────────────────────────────────────────────
location /mlflow/ {
    limit_req zone=general burst=10;

    proxy_pass http://careiq_mlflow/;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # MLflow artifacts can be large
    proxy_read_timeout 300s;
    client_max_body_size 500M;
}

# ─── Metabase BI Dashboard ───────────────────────────────────────────────────
location /metabase/ {
    limit_req zone=general burst=10;

    proxy_pass http://careiq_metabase/;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ─── Airflow ─────────────────────────────────────────────────────────────────
location /airflow/ {
    limit_req zone=general burst=10;

    proxy_pass http://careiq_airflow/;
    proxy_http_version 1.1;
    proxy_set_header Connection "upgrade";
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ─── React SPA (catch-all) ───────────────────────────────────────────────────
location / {
    limit_req zone=general burst=50 nodelay;

    proxy_pass http://careiq_frontend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
