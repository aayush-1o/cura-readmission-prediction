# ═══════════════════════════════════════════════════════════════════════════════
# CareIQ — Nginx Reverse Proxy
# Entry point for ALL external traffic.
#
# Routing:
#   /api/*        → FastAPI backend (api:8000)
#   /airflow/*    → Airflow webserver (airflow-webserver:8080)
#   /mlflow/*     → MLflow tracking server (mlflow:5000)
#   /metabase/*   → Metabase BI (metabase:3000)
#   /*            → React frontend (frontend:3000)
#
# Security headers enforced on every response.
# Rate limiting: 100 req/s per IP, 50 req/s on /api.
# ═══════════════════════════════════════════════════════════════════════════════

user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Logging ─────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ─── Performance ──────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;  # don't reveal nginx version

    client_max_body_size 10M;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # ─── Gzip Compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # ─── Rate Limiting ────────────────────────────────────────────────────────
    # General: 100 requests/second per IP
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;
    # API: 50 requests/second per IP (tighter for ML endpoints)
    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
    # Auth: 10 requests/minute per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    # ─── Upstream Definitions ────────────────────────────────────────────────
    upstream careiq_api {
        server api:8000;
        keepalive 32;
    }

    upstream careiq_frontend {
        server frontend:3000;
        keepalive 16;
    }

    upstream careiq_mlflow {
        server mlflow:5000;
        keepalive 8;
    }

    upstream careiq_metabase {
        server metabase:3000;
        keepalive 8;
    }

    upstream careiq_airflow {
        server airflow-webserver:8080;
        keepalive 8;
    }

    # ─── Security Headers Map ────────────────────────────────────────────────
    map $sent_http_content_type $csp_header {
        default "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none';";
    }

    # ─── HTTP → HTTPS redirect ───────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Allow health checks without redirect
        location = /nginx-health {
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # Redirect all other traffic to HTTPS
        # Uncomment in production with real TLS:
        # return 301 https://$host$request_uri;

        # For development/demo (HTTP only), include the main config inline:
        include /etc/nginx/conf.d/careiq-http.conf;
    }

    # ─── HTTPS Server ────────────────────────────────────────────────────────
    # Uncomment and configure for production TLS:
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name careiq.yourdomain.com;
    #
    #     ssl_certificate /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #     ssl_stapling on;
    #     ssl_stapling_verify on;
    #
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    #
    #     include /etc/nginx/conf.d/careiq-http.conf;
    # }
}
